<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAAC Portal — Coordinator Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0f1f3d; --blue: #1a3a6b; --accent: #c8a84b; --accent-light: #e8c96d;
            --white: #ffffff; --gray: #8a8f9e;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 80% 50%, rgba(200,168,75,0.07) 0%, transparent 60%);
        }
        .bg-pattern {
            position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
        }
        .container {
            position: relative; z-index: 10;
            width: 100%; max-width: 480px; padding: 20px;
            animation: fadeUp 0.7s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--gray); text-decoration: none; font-size: 13px;
            font-weight: 500; margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 40px;
            backdrop-filter: blur(20px);
        }
        .card-header { margin-bottom: 32px; }
        .badge {
            display: inline-block; padding: 4px 12px;
            background: rgba(200,168,75,0.15);
            border: 1px solid rgba(200,168,75,0.3);
            border-radius: 20px; color: var(--accent);
            font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase; margin-bottom: 12px;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px; color: var(--white); line-height: 1.2;
        }
        .card-subtitle { font-size: 13px; color: var(--gray); margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--gray); letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            outline: none; transition: border-color 0.2s, background 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.25); }
        input:focus { border-color: var(--accent); background: rgba(200,168,75,0.06); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .btn-primary {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none; border-radius: 12px;
            color: var(--navy); font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 700; cursor: pointer;
            margin-top: 8px; transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,168,75,0.35); }
        .note {
            margin-top: 20px; padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; font-size: 13px;
            color: var(--gray); line-height: 1.5;
        }
        .note span { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="container">
    <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Back to Login
    </a>

    <div class="card">
        <div class="card-header">
            <div class="badge">Coordinator</div>
            <div class="card-title">Create your account</div>
            <div class="card-subtitle">Fill in your details to register as a coordinator</div>
        </div>

        <form method="POST" action="/register_coordinator">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" placeholder="e.g. CSE" required>
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-primary">Submit Registration</button>
        </form>

        <div class="note">
            <span>Note:</span> Your account will be reviewed by the admin. Section will be assigned upon approval.
        </div>
    </div>
</div>
</body>
</html>
