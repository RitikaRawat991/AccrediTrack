<!DOCTYPE html>
<html>
<head>
    <title>NAAC Portal Login</title>
</head>
<body>

    <h2>NAAC Portal Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p style="color: {% if category == 'success' %}green{% else %}red{% endif %};"><strong>{{ message }}</strong></p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="username"
               placeholder="Username (Roll No for students)" required>
        <br><br>

        <input type="password" name="password"
               placeholder="Password" required>
        <br><br>

        <button type="submit">Login</button>

    </form>

    <hr>

    <p>If you are new, register here:</p>

    <p>
        <a href="/register_coordinator">Register as Coordinator</a>
    </p>

    <p>
        <a href="/register_student">Register as Student</a>
    </p>

</body>
</html>
