<!DOCTYPE html>
<html>
<head>
    <title>NAAC Portal Login</title>
</head>
<body>

    <h2>NAAC Portal Login</h2>

    {% if error %}
        <p style="color:red;"><strong>{{ error }}</strong></p>
    {% endif %}

    <form method="POST">

        <input type="text" name="username"
               placeholder="Username (Roll No for students)" required>
        <br><br>

        <input type="password" name="password"
               placeholder="Password" required>
        <br><br>

        <button type="submit">Login</button>

    </form>

    <hr>

    <p>If you are new, register here:</p>

    <p>
        <a href="/register">Register as Coordinator</a>
    </p>

    <p>
        <a href="/register_student">Register as Student</a>
    </p>

</body>
</html>
